<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>test</title>
</head>
<body>
     <h1>AWM股票0.0.1 Alpha</h1>
    <style>
        * {
            font-family:"Microsoft YaHei" , sans-serif;
        }
        h1{
            text-align:center;
        }
    </style>
    <canvas id="myChart"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById("myChart").getContext("2d")
        const data = [
            {name:"AWM",num:250},
            {name:"Lemon",num:300},
            {name:"GaoHanTu",num:200},
            {name:"Utw",num:800},
            {name:"Fafat",num:250},
            {name:"COHL",num:300},
            {name:"UWSF",num:250},
            {name:"Vial",num:250},
            {name:"SOTL",num:350},
            {name:"Oganesson",num:300}
        ]
        const chart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: data.map(i => i.name),
                datasets: [{
                    label: "公司市值",
                    data: data.map(i => i.num),
                    backgroundColor: "#3498db"
                }]
            },
            options: {
                scales: {
                    y: {
                    min: 0,    // 固定最小值
                    max: 900,  // 固定最大值
                    // 关键：不自动调整边界
                    suggestedMin: undefined,
                    suggestedMax: undefined
                    }
                }
            }
        })
        let AWM1 = 250
        let Lemon1 = 300
        let GaoHanTu1 = 200
        let Utw1 = 800
        let Fafat1 = 250
        let COHL1 = 300
        let UWSF1 = 250
        let Vial1 = 250
        let SOTL = 350
        let Oganesson = 300
        setInterval(() => {
          let AWM = Math.floor(Math.random() * 20 + 240)
          let Lemon = Math.floor(Math.random() * 20 + 290)
          let GaoHanTu = Math.floor(Math.random() * 20 + 190) 
          let Utw = Math.floor(Math.random() * 20 + 790)
          let Fafat = Math.floor(Math.random() * 20 + 240)
          let COHL = Math.floor(Math.random() * 20 + 290)
          let UWSF = Math.floor(Math.random() * 20 + 240)
          let Vial = Math.floor(Math.random() * 20 + 240)
          let SOTL = Math.floor(Math.random() * 20 + 340)
          let Oganesson = Math.floor(Math.random() * 20 + 290)
            chart.data.datasets[0].data = [AWM,
                                           Lemon,
                                           GaoHanTu,
                                           Utw,
                                           Fafat,
                                           COHL,
                                           UWSF,
                                           Vial,
                                           SOTL,
                                           Oganesson]
            chart.data.labels = ["AWM(" + Math.round((AWM-AWM1)*10000/AWM1)/100 + "%)",
                                "Lemon(" + Math.round((Lemon-Lemon1)*10000/Lemon1)/100 + "%)",
                                "GaoHanTu(" + Math.round((GaoHanTu-GaoHanTu1)*10000/GaoHanTu1)/100 + "%)",
                                "Utw(" + Math.round((Utw-Utw1)*10000/Utw1)/100 + "%)",
                                "Fafat(" + Math.round((Fafat-Fafat1)*10000/Fafat1)/100 + "%)",
                                "COHL(" + Math.round((COHL-COHL1)*10000/COHL1)/100 + "%)",
                                "UWSF(" + Math.round((UWSF-UWSF1)*10000/UWSF1)/100 + "%)",
                                "Vial(" + Math.round((Vial-Vial1)*10000/Vial1)/100 + "%)",
                                "SOTL(" + Math.round((SOTL-SOTL1)*10000/SOTL1)/100 + "%)",
                                "Oganesson(" + Math.round((Oganesson-Ogansson1)*10000/Ogansson1)/100 + "%)",]
                                AWM1 = AWM
                                Lemon1 = Lemon
                                GaoHanTu1 = GaoHanTu
                                Utw1 = Utw
                                Fafat1 = Fafat
                                COHL1 = COHL
                                UWSF1 = UWSF
                                Vial1 = Vial
                                SOTL1 = SOTL
                                Oganesson1 = Oganesson
        chart.update()
        },1000)
    </script>
</body>
</html>
