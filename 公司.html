<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>test</title>
    <style>
        * {
            font-family:"Microsoft YaHei" , sans-serif;
        }
        h1,p{
            text-align:center;
        }
    </style>
</head>
<body>
    <h1 onclick="light()">AWM股票0.0.1-Beta.1</h1>
    <canvas id="myChart"></canvas>
    <hr>
    <h1 style="text-align:center">更新日志</h1>
    <p>0.0.0: AWM股票的测试版本，是学完Chart上手第一个做的，属于是up的小demo了</p>
    <p>0.0.1-Alpha: 第二个版本，一大堆bug，坐标动的太频繁，做更新日志被误判浮点数类型，柱状图加载不出来，做百分比改了800行代码。</p>
    <p>0.0.1-Beta: 十万个bug终于改完了，更新日志弹窗不了所以整柱状图下方了，这里感谢Fafat对我代码的纠正。</p>
    <p>0.0.1-Beta.1: 加了个深色模式，感觉怎么都不太美观，所以做成点击标题切换了。</p>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.getItem("light") == "dark"){
            document.body.style.background = "black"
            docuemnt.body.style.color = "white"
        }
        else{
            document.body.style.background = "white"
            document.body.style.color = "black"
        }
        function light(){
            if (localStorage.getItem("light") == "dark"){
                localStorage.setItem("light" , "light")
                document.body.style.background = "white"
                document.body.style.color = "black"
            }
            else{
                localStorage.setItem("light" , "dark")
                document.body.style.background = "black"
                document.body.style.color = "white"
            }
        const ctx = document.getElementById("myChart").getContext("2d")
        const data = [
            {name:"AWM",num:250},
            {name:"Lemon",num:300},
            {name:"GaoHanTu",num:200},
            {name:"Utw",num:800},
            {name:"Fafat",num:250},
            {name:"COHL",num:300},
            {name:"UWSF",num:250},
            {name:"Vial",num:250},
            {name:"SOTL",num:350},
            {name:"Oganesson",num:300},
            {name:"Nx",num:250}
        ]
        const chart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: data.map(i => i.name),
                datasets: [{
                    label: "公司市值",
                    data: data.map(i => i.num),
                    backgroundColor: "#3498db"
                }]
            },
            options: {
                scales: {
                    y: {
                        min: 0,
                        max: 900,
                        suggestedMin: undefined,
                        suggestedMax: undefined
                    }
                }
            }
        })
        // 补全缺失的 SOTL1、Oganesson1 初始变量
        let AWM1 = 250
        let Lemon1 = 300
        let GaoHanTu1 = 200
        let Utw1 = 800
        let Fafat1 = 250
        let COHL1 = 300
        let UWSF1 = 250
        let Vial1 = 250
        let SOTL1 = 350
        let Oganesson1 = 300
        let Nx1 = 250

        setInterval(() => {
            let AWM = Math.floor(Math.random() * 20 + 240)
            let Lemon = Math.floor(Math.random() * 20 + 290)
            let GaoHanTu = Math.floor(Math.random() * 10 + 195)
            let Utw = Math.floor(Math.random() * 20 + 790)
            let Fafat = Math.floor(Math.random() * 20 + 240)
            let COHL = Math.floor(Math.random() * 20 + 290)
            let UWSF = Math.floor(Math.random() * 20 + 240)
            let Vial = Math.floor(Math.random() * 20 + 240)
            let SOTL = Math.floor(Math.random() * 20 + 340)
            let Oganesson = Math.floor(Math.random() * 20 + 290)
            let Nx = Math.floor(Math.random() * 20 + 240)

            chart.data.datasets[0].data = [
                AWM,
                Lemon,
                GaoHanTu,
                Utw,
                Fafat,
                COHL,
                UWSF,
                Vial,
                SOTL,
                Oganesson,
                Nx
            ]
            chart.data.labels = [
                "AWM(" + Math.round((AWM - AWM1) * 10000 / AWM1) / 100 + "%)",
                "Lemon(" + Math.round((Lemon - Lemon1) * 10000 / Lemon1) / 100 + "%)",
                "GaoHanTu(" + Math.round((GaoHanTu - GaoHanTu1) * 10000 / GaoHanTu1) / 100 + "%)",
                "Utw(" + Math.round((Utw - Utw1) * 10000 / Utw1) / 100 + "%)",
                "Fafat(" + Math.round((Fafat - Fafat1) * 10000 / Fafat1) / 100 + "%)",
                "COHL(" + Math.round((COHL - COHL1) * 10000 / COHL1) / 100 + "%)",
                "UWSF(" + Math.round((UWSF - UWSF1) * 10000 / UWSF1) / 100 + "%)",
                "Vial(" + Math.round((Vial - Vial1) * 10000 / Vial1) / 100 + "%)",
                "SOTL(" + Math.round((SOTL - SOTL1) * 10000 / SOTL1) / 100 + "%)",
                "Oganesson(" + Math.round((Oganesson - Oganesson1) * 10000 / Oganesson1) / 100 + "%)",
                "Nx(" + Math.round((Nx-Nx1) * 10000 / Nx1) / 100 + "%)"
            ]

            // 更新上一轮数值
            AWM1 = AWM
            Lemon1 = Lemon
            GaoHanTu1 = GaoHanTu
            Utw1 = Utw
            Fafat1 = Fafat
            COHL1 = COHL
            UWSF1 = UWSF
            Vial1 = Vial
            SOTL1 = SOTL
            Oganesson1 = Oganesson
            Nx1 = Nx

            chart.update()
        }, 1000)
    </script>
</body>
</html>
