<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>test</title>
</head>
<body>
     <h1>AWM股票0.0.1 Alpha</h1>
    <style>
        * {
            font-family:"Microsoft YaHei" , sans-serif;
        }
        h1{
            text-align:center;
        }
    </style>
    <canvas id="myChart"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById("myChart").getContext("2d")
        const data = [
            {name:"AWM",num:250},
            {name:"Lemon",num:300},
            {name:"GaoHanTu",num:200},
            {name:"Utw",num:800},
            {name:"Fafat",num:250},
            {name:"COHL",num:300},
            {name:"UWSF",num:250},
            {name:"Vial",num:250},
            {name:"SOTL",num:350},
            {name:"Oganesson",num:300}
        ]
        const chart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: data.map(i => i.name),
                datasets: [{
                    label: "公司市值",
                    data: data.map(i => i.num),
                    backgroundColor: "#3498db"
                }]
            },
            options: {
                scales: {
                    y: {
                    min: 0,    // 固定最小值
                    max: 900,  // 固定最大值
                    // 关键：不自动调整边界
                    suggestedMin: undefined,
                    suggestedMax: undefined
                    }
                }
            }
        })
        setInterval(() => {
          let AWM = Math.floor(Math.random() * 20 + 240)
          let Lemon = Math.floor(Math.random() * 20 + 290)
          let GaoHanTu = Math.floor(Math.random() * 20 + 190) 
          let Utw = Math.floor(Math.random() * 20 + 790)
          let Fafat = Math.floor(Math.random() * 20 + 240)
          let COHL = Math.floor(Math.random() * 20 + 290)
          let UWSF = Math.floor(Math.random() * 20 + 240)
          let Vial = Math.floor(Math.random() * 20 + 240)
          let SOTL = Math.floor(Math.random() * 20 + 340)
          let Oganesson = Math.floor(Math.random() * 20 + 290)
            chart.data.datasets[0].data = [AWM,
                                           Lemon,
                                           GaoHanTu,
                                           Utw,
                                           Fafat,
                                           COHL,
                                           UWSF,
                                           Vial,
                                           SOTL,
                                           Oganesson]
        chart.update()
        },1000)
    </script>
</body>
</html>
