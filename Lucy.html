<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title>Lucy English</title>
    <style>
        body {
            background:#3498db;
            text-align:center;
            font-family:"Microsoft YaHei" , sans-serif;
            color:white;
            text-shadow:2px 2px #aaaaaa;
        }
        button {
            border:none;
            border-radius:6px;
            padding:10px 15px;
        }
        /* 去掉canvas白底，透明透出页面蓝色背景，和body同色 */
        canvas {
            background:transparent;
        }
    </style>
    <!-- 闭合script标签 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Welcome to Lucy English</h1>
    <h1 id="time"></h1>
    <p>Please start and finish English class on time.</p>
    <p>Please say "Good morning" or "Good afternoon".</p>
    <p>We will get a candy after every word test.</p>
    <p>You can share your day at the start or end of class.</p>
    <br>
    <h5>UK: The United Kingdom of Great Britain and Northern Ireland</h5>
    <br>
    <h1>百词斩评分</h1>
    <canvas id="myChart"></canvas>

    <script>
        let time = document.getElementById("time")
        const f = () => {
            time.textContent = new Date()
            setTimeout(f,1000)
        };
        f()

        //--------Chart---------
        const ctx = document.getElementById("myChart").getContext("2d")
        const data = [
            {name:"Leo",num:90},
            {name:"Elsa",num:95},
            {name:"Bosco",num:15},
            {name:"Angela",num:90},
            {name:"Harrison",num:85}
        ]
        const chart = new Chart(ctx,{
            type:"bar",
            data:{
                labels:data.map(i => i.name),
                datasets:[{
                    label:"百词斩综合评价分数",
                    data:data.map(i => i.num),
                    backgroundColor:"#2980b9"
                }]
            },
            options:{
                // 坐标轴、图例文字改成白色，适配蓝色背景
                plugins:{
                    legend:{
                        labels:{
                            color:"#fff"
                        }
                    }
                },
                scales:{
                    x:{
                        ticks:{color:"#fff"}
                    },
                    y:{
                        ticks:{color:"#fff"}
                    }
                }
            }
        })
        setInterval(() => {
            chart.data.datasets[0].data = [
                Math.round(Math.random() * 2 + 89),
                Math.round(Math.random() * 2 + 94),
                Math.round(Math.random() * 2 + 14),
                Math.round(Math.random() * 2 + 89),
                Math.round(Math.random() * 2 + 84)
            ]
            chart.update()
        },1000)
    </script>
</body>
</html>
